<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#080c16" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Industrial safety intelligence for field workers - real-time risk monitoring, permit management, and emergency response." />
  <title>ZeroHarm AI - Field Safety</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #080c16; color: #e0e5ec; overflow: hidden;
           -webkit-font-smoothing: antialiased;
           -moz-osx-font-smoothing: grayscale;
           -webkit-tap-highlight-color: transparent;
           touch-action: manipulation; }
    #root { width: 100vw; height: 100vh; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(255,23,68,0.3); } 50% { box-shadow: 0 0 20px rgba(255,23,68,0.6); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1520; }
    ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #374151; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' }).then(function(reg) {
          reg.onupdatefound = function() {
            var installing = reg.installing;
            if (installing) {
              installing.onstatechange = function() {
                if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('ZeroHarm AI PWA ready for offline use');
                }
              };
            }
          };
        }).catch(function(e) {
          console.error('Service worker registration failed:', e);
        });
      });
    }
  </script>
</body>
</html>
