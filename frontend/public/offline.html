<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ZeroHarm AI - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #0a0e17; color: #e0e5ec; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; padding: 20px; }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(90deg, #00e5ff, #00bcd4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 13px; color: #6b7280; line-height: 1.5; margin-bottom: 20px; }
    .dot { width: 8px; height: 8px; background: #ffa000; border-radius: 50%; margin: 0 auto 12px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .note { font-size: 11px; color: #4b5563; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">{'\u{1F6E1}\uFE0F'}</div>
    <div class="dot"></div>
    <h1>You're Offline</h1>
    <p>ZeroHarm AI is operating in offline mode. Some features may be limited until connectivity is restored.</p>
    <p class="note">Cached safety data is still available for review.</p>
  </div>
</body>
</html>
