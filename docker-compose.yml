services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/zeroharm.db
      - HOST=0.0.0.0
      - PORT=8000
      - WS_UPDATE_INTERVAL=2
      - RISK_TREND_MAX=60
      - HIGH_RISK_PERMIT_PENALTY=0.15
      - RAG_DEFAULT_TOP_K=3
      - ALLOWED_ORIGINS=http://13.59.83.134,http://localhost:3000,http://localhost:8080
    healthcheck:
      test: wget -qO- http://localhost:8000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - zeroharm_data:/app/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stop_grace_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_WS_URL=ws://13.59.83.134:8000/ws
        - REACT_APP_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stop_grace_period: 10s

volumes:
  zeroharm_data:
